<!DOCTYPE html>
<html>
<head>
  <title>Click Counter</title>
</head>

<body>

<div class="container">
  <h1>Click Counter</h1>
  <h2 id="count">0</h2>

  <div class="buttons">
    <button onclick="increase()" class="btn green">Increase</button>
    <button onclick="decrease()" class="btn red">Decrease</button>
    <button onclick="resetCount()" class="btn blue">Reset</button>
  </div>
</div>

<style>
body {
  background: #0d1117;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  text-align: center;
}

h1 {
  margin-bottom: 10px;
}

#count {
  font-size: 60px;
  margin: 20px 0;
  transition: transform 0.2s;
}

.buttons {
  display: flex;
  gap: 10px;
  justify-content: center;
}

.btn {
  padding: 15px 25px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.1);
}

.btn:active {
  transform: scale(0.95);
}

.green { background: #2ea043; color: white; }
.red { background: #f85149; color: white; }
.blue { background: #1f6feb; color: white; }
</style>

<script>
let count = localStorage.getItem("count") || 0;

update();

function update() {
  document.getElementById("count").innerText = count;
  localStorage.setItem("count", count);
}

function increase() {
  count++;
  update();
}

function decrease() {
  if (count > 0) {
    count--;
    update();
  }
}

function resetCount() {
  count = 0;
  update();
}
</script>

  if (count > 0) {
    count--;
    update();
  }
}

function resetCount() {
  count = 0;
  update();
}
</script>

</body>
</html>
