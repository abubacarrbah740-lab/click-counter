<!DOCTYPE html>
<html>
<head>
  <title>Tasbeeh Counter</title>

  <style>
    body {
      background: #0d1117;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      text-align: center;
    }

    h1 {
      margin-bottom: 5px;
    }

    h3 {
      color: #ccc;
      margin-bottom: 20px;
    }

    #count {
      font-size: 60px;
      margin: 20px 0;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn {
      padding: 15px 25px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      color: white;
    }

    .green { background: #2ea043; }
    .red { background: #f85149; }
    .blue { background: #1f6feb; }
    .purple { background: #8e44ad; }

    #goalText {
      margin-top: 15px;
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🕌 Tasbeeh Counter</h1>
  <h3>SubhanAllah (سبحان الله)</h3>

  <h2 id="count">0</h2>

  <div class="buttons">
    <button onclick="increase()" class="btn green">+1</button>
    <button onclick="addTen()" class="btn purple">+10</button>
    <button onclick="resetCount()" class="btn red">Reset</button>
  </div>

  <p id="goalText">Goal: 33</p>
</div>

<script>
let count = localStorage.getItem("count") || 0;

update();

function update() {
  document.getElementById("count").innerText = count;
  localStorage.setItem("count", count);

  if (count == 33) {
    alert("Alhamdulillah! You reached 33 🎉");
  }
}

function increase() {
  count++;
  update();
}

function addTen() {
  count = Number(count) + 10;
  update();
}

function resetCount() {
  count = 0;
  update();
}
</script>

</body>
</html>
